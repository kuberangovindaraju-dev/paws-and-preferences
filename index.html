<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Paws & Preferences — Discover your favourite kind of cat with a swipe." />
  <meta name="theme-color" content="#F9F4EE" />
  <meta property="og:title" content="Paws & Preferences 🐾" />
  <meta property="og:description" content="Swipe to find your favourite kind of cat!" />
  <meta property="og:type" content="website" />
  <title>Paws & Preferences 🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/animations.css" />
</head>
<body>

  <div id="loading">
    <div class="paw-loader">🐾</div>
    <p>Fetching some cuties…</p>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <div id="app">
    <header>
      <div class="logo">Paws <span>&</span> Preferences</div>
      <div class="progress-pill"><b id="current-num">1</b> / <span id="total-num">15</span></div>
    </header>
    <div id="stack-area"></div>
    <p class="hint">Swipe right to ❤️ · Swipe left to skip</p>
    <div id="actions">
      <button class="btn btn-nope" id="btn-nope" aria-label="Dislike">✕</button>
      <button class="btn btn-like" id="btn-like" aria-label="Like">♥</button>
    </div>
  </div>

  <div id="summary">
    <div class="summary-header">
      <div class="big-emoji" id="summary-emoji">🐱</div>
      <h2 id="summary-title">You're a cat person!</h2>
      <p id="summary-desc">Here's what you thought of today's lineup.</p>
    </div>
    <div class="stats-row">
      <div class="stat-card liked">
        <div class="stat-num" id="stat-liked">0</div>
        <div class="stat-label">Liked</div>
      </div>
      <div class="stat-card passed">
        <div class="stat-num" id="stat-passed">0</div>
        <div class="stat-label">Passed</div>
      </div>
      <div class="stat-card total">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    <div class="liked-section">
      <h3 id="liked-heading">Your favourites 🐾</h3>
      <div class="liked-grid" id="liked-grid"></div>
      <div class="empty-likes" id="empty-likes" style="display:none;">No cats liked — they'll win you over next time! 😸</div>
    </div>
    <button class="replay-btn" id="replay-btn">Try again 🔄</button>
  </div>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
